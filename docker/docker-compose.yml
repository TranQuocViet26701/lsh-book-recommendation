version: "3.8"

services:
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: lsh-dev
    environment:
      - LSH_ENV=dev
    ports:
      - "8888:8888"
      - "8501:8501"
      - "8000:8000"
      - "4040:4040"
    volumes:
      - ..:/app
    working_dir: /app
