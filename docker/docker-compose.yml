services:
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: lsh-dev
    environment:
      - LSH_ENV=dev
      - PYTHONPATH=/app
      - JAVA_HOME=/usr/lib/jvm/java-21
      - UV_PROJECT_ENVIRONMENT=/opt/venv
      - PYSPARK_PYTHON=/opt/venv/bin/python
      - PYSPARK_DRIVER_PYTHON=/opt/venv/bin/python
    ports:
      - "8888:8888"
      - "8501:8501"
      - "8000:8000"
      - "4040:4040"
    volumes:
      - ..:/app
    working_dir: /app
